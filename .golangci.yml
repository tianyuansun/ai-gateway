linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive

linters-settings:
  goimports:
    local-prefixes: github.com/tianyuansun/ai-gateway
  revive:
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers

run:
  timeout: 3m
